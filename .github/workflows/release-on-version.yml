name: Release mod-lingo on Version Change

on:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.meta.outputs.version_changed }}
      version: ${{ steps.meta.outputs.version }}
      prev_version: ${{ steps.meta.outputs.prev_version }}
      tag: ${{ steps.meta.outputs.tag }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      channel: ${{ steps.meta.outputs.channel }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve Version Metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const cp = require('node:child_process');

          const outputFile = process.env.GITHUB_OUTPUT;
          const eventName = process.env.EVENT_NAME;
          const beforeSha = process.env.BEFORE_SHA || '';

          function setOutput(key, value) {
            fs.appendFileSync(outputFile, `${key}=${value}\n`);
          }

          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const version = String(packageJson.version || '');

          const semverRegex =
            /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*)(?:\.(?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*))*))?(?:\+([0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*))?$/;

          if (!semverRegex.test(version)) {
            console.error(`Invalid SemVer in package.json: "${version}"`);
            process.exit(1);
          }

          let prevVersion = '';
          let versionChanged = true;

          const canComparePrevious =
            eventName === 'push' && beforeSha && !/^0+$/.test(beforeSha);

          if (canComparePrevious) {
            try {
              const previousPackageJsonRaw = cp.execSync(
                `git show ${beforeSha}:package.json`,
                { encoding: 'utf8' }
              );
              const previousPackageJson = JSON.parse(previousPackageJsonRaw);
              prevVersion = String(previousPackageJson.version || '');
              versionChanged = prevVersion !== version;
            } catch (error) {
              console.warn(
                `Failed to load previous package.json from ${beforeSha}: ${error.message}`
              );
              prevVersion = '(unavailable)';
              versionChanged = true;
            }
          } else if (eventName === 'workflow_dispatch') {
            prevVersion = '(manual-dispatch)';
            versionChanged = true;
          } else {
            prevVersion = '(unknown)';
            versionChanged = true;
          }

          const prereleasePart = version.includes('-')
            ? version.split('-')[1].split('+')[0]
            : '';
          const channel = prereleasePart ? prereleasePart.split('.')[0] : 'stable';
          const isPrerelease = prereleasePart ? 'true' : 'false';
          const tag = `v${version}`;

          setOutput('version_changed', String(versionChanged));
          setOutput('version', version);
          setOutput('prev_version', prevVersion);
          setOutput('tag', tag);
          setOutput('is_prerelease', isPrerelease);
          setOutput('channel', channel);

          console.log(`Version: ${version}`);
          console.log(`Previous Version: ${prevVersion}`);
          console.log(`Version Changed: ${versionChanged}`);
          console.log(`Tag: ${tag}`);
          console.log(`Channel: ${channel}`);
          console.log(`Prerelease: ${isPrerelease}`);
          NODE

  build_windows:
    name: Build Windows x64
    runs-on: windows-latest
    needs: prepare
    if: needs.prepare.outputs.version_changed == 'true'
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build App
        run: pnpm build

      - name: Build Windows Installer
        run: pnpm exec electron-builder --win nsis --x64 --publish never

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-windows-x64
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest*.yml
          if-no-files-found: error

  build_macos:
    name: Build macOS x64/arm64
    runs-on: macos-latest
    needs: prepare
    if: needs.prepare.outputs.version_changed == 'true'
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build App
        run: pnpm build

      - name: Build macOS Packages
        run: pnpm exec electron-builder --mac dmg zip --x64 --arm64 --publish never

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-macos
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.zip.blockmap
            dist/latest-mac.yml
          if-no-files-found: error

  build_linux:
    name: Build Linux x64 (AppImage + deb)
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.version_changed == 'true'
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build App
        run: pnpm build

      - name: Build Linux Packages
        run: pnpm exec electron-builder --linux AppImage deb --x64 --publish never

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-linux-x64
          path: |
            dist/*.AppImage
            dist/*.AppImage.blockmap
            dist/*.deb
            dist/latest-linux.yml
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_windows
      - build_macos
      - build_linux
    if: needs.prepare.outputs.version_changed == 'true'
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true

      - name: Create or Update Release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          CHANNEL: ${{ needs.prepare.outputs.channel }}
          IS_PRERELEASE: ${{ needs.prepare.outputs.is_prerelease }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          release_title="mod-lingo v${VERSION}"
          if [ "${IS_PRERELEASE}" = "true" ]; then
            release_title="${release_title} (${CHANNEL} preview)"
          fi

          build_time_utc="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          notes_file="$(mktemp)"
          cat > "${notes_file}" <<EOF
          Version: ${VERSION}
          Channel: ${CHANNEL}
          Commit: ${COMMIT_SHA}
          Build Time (UTC): ${build_time_utc}
          EOF

          if gh release view "${TAG}" --repo "${REPO}" >/dev/null 2>&1; then
            echo "Release ${TAG} exists. Updating release metadata and assets."
            if [ "${IS_PRERELEASE}" = "true" ]; then
              gh release edit "${TAG}" \
                --repo "${REPO}" \
                --title "${release_title}" \
                --notes-file "${notes_file}" \
                --prerelease
            else
              gh release edit "${TAG}" \
                --repo "${REPO}" \
                --title "${release_title}" \
                --notes-file "${notes_file}"
            fi

            gh release upload "${TAG}" artifacts/* --repo "${REPO}" --clobber
          else
            echo "Release ${TAG} does not exist. Creating a new release."
            if [ "${IS_PRERELEASE}" = "true" ]; then
              gh release create "${TAG}" artifacts/* \
                --repo "${REPO}" \
                --title "${release_title}" \
                --notes-file "${notes_file}" \
                --prerelease
            else
              gh release create "${TAG}" artifacts/* \
                --repo "${REPO}" \
                --title "${release_title}" \
                --notes-file "${notes_file}"
            fi
          fi
